---
# Task 1 - Install Ollama
- name: Install Ollama
  shell: curl -fsSL {{ ollama_install_script }} | sh
  args:
    creates: /usr/local/bin/ollama # idempotent install. skips if already installed

# Task 2 - Create log directory
- name: Create Ollama log directory
  file:
    path: "{{ ollama_log_dir }}"
    state: directory
    owner: "{{ ollama_user }}"
    group: "{{ ollama_group }}"
    mode: '0755'

# Task 3 - Configure systemd override
- name: Create systemd override directory
  file:
    path: /etc/systemd/system/ollama.service.d
    state: directory
    owner: root
    group: root
    mode: '0755'

# Task 4 - Deploy systemd override template
- name: Configure systemd override
  template:
    src: override.conf.j2
    dest: /etc/systemd/system/ollama.service.d/override.conf
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload systemd
    - Restart Ollama

# Task 5 - Configure logrotate
- name: Configure logrotate for Ollama
  template:
    src: logrotate.j2
    dest: /etc/logrotate.d/ollama
    owner: root
    group: root
    mode: '0644'

# Task 6 - Ensure Ollama service is enabled and running
- name: Enable and start Ollama service
  systemd:
    name: ollama
    enabled: yes
    state: started
  register: service_result
  retries: 3
  delay: 10
  until: service_result is not failed

# Task 7 - Pull Ollama model
- name: Pull Ollama model
  shell: ollama pull {{ ollama_model }}
  become: false
  register: pull_result
  changed_when: "'already up to date' not in pull_result.stdout"

# Task 8 - Verify Ollama is responding
- name: Verify Ollama API is responding
  uri:
    url: "http://localhost:{{ ollama_port }}"
    method: GET
    status_code: 200
  register: health_check
  retries: 3
  delay: 5

# Task 9 - Create exporter directory
- name: Create Ollama exporter directory
  file:
    path: "{{ ollama_exporter_path }}"
    state: directory
    owner: "{{ ollama_exporter_user }}"
    group: "{{ ollama_group }}"
    mode: '0755'

# Task 10 - Deploy exporter script
- name: Deploy Ollama exporter script
  template:
    src: ollama_exporter.py.j2
    dest: "{{ ollama_exporter_path }}/ollama_exporter.py"
    owner: "{{ ollama_exporter_user }}"
    group: "{{ ollama_group }}"
    mode: '0755'
  notify: Restart Ollama exporter

# Task 11 - Deploy exporter systemd service
- name: Deploy Ollama exporter service
  ansible.builtin.template:
    src: ollama_exporter.service.j2
    dest: /etc/systemd/system/ollama-exporter.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload systemd
    - Restart Ollama exporter

# Task 12 - Enable and start exporter service
- name: Enable and start Ollama exporter
  systemd:
    name: ollama-exporter
    enabled: yes
    state: started

# Task 13 - Install Node Exporter
- name: Install Node Exporter
  apt:
    name: prometheus-node-exporter
    state: present
  notify: Restart Node Exporter

# Task 14 - Enable and start Node Exporter
- name: Enable and start Node Exporter
  systemd:
    name: prometheus-node-exporter
    enabled: yes
    state: started
