global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # Prometheus self monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Ollama exporter on phi VM
  - job_name: "ollama"
    static_configs:
      - targets: ["192.168.1.52:8000"]
        labels:
          instance: "phi"
          service: "ollama"

  # Node exporter on phi VM
  - job_name: "node"
    static_configs:
      - targets: ["192.168.1.52:9100"]
        labels:
          instance: "phi"
          service: "node"